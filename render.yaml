services:
  - type: web
    name: blogging-system-api
    env: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: RENDER_EXTERNAL_HOSTNAME
        value: canvas4blog.onrender.com
      - key: DJANGO_ALLOWED_HOSTS
        value: canvas4blog.onrender.com,.onrender.com,127.0.0.1,localhost
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: https://canvas4blog.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://canvas4blog.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"

  - type: cron
    name: blogging-system-keepalive
    env: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    schedule: "*/5 * * * *"
    startCommand: >-
      python -c 'import os,time,urllib.request; base=os.environ.get("PING_URL", "https://blogging-system-api.onrender.com").rstrip("/"); url=base + "/api/v1/health/"; ok=False
for _ in range(3):
    try:
        urllib.request.urlopen(url, timeout=25)
        ok=True
        break
    except Exception:
        time.sleep(5)
raise SystemExit(0 if ok else 1)'
    envVars:
      - key: PING_URL
        value: https://canvas4blog.onrender.com
