services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogging-system-api
    env_file:
      - .env
    ports:
      - "8001:8001"
    restart: unless-stopped
    volumes:
      - media_data:/app/backend/media

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: /api/v1/
    container_name: blogging-system-frontend
    depends_on:
      - web
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  media_data:
